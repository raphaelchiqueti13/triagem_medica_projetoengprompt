<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas de Triagem - UNICID</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <form id="form-triagem">
            <h2>Pré-Atendimento</h2>
            
            <input type="text" id="nome" placeholder="Nome Completo" required>
            <input type="email" id="email" placeholder="E-mail para resposta" required>
            <input type="number" id="idade" placeholder="Idade" required>
            
            <select id="prioridade" required>
                <option value="" disabled selected>Selecione a Urgência</option>
                <option value="Baixa">Baixa - Posso esperar</option>
                <option value="Media">Média - Dor moderada</option>
                <option value="Alta">Alta - Emergência</option>
            </select>

            <textarea id="sintomas" placeholder="Descreva seus sintomas aqui..." required></textarea>

            <button type="submit" id="btn-enviar">ENVIAR TRIAGEM</button>
        </form>
    </div>
    <!-- ... resto do seu HTML acima ... -->
    <script>
        const WEBHOOK_MAKE = "https://hook.us2.make.com/nryvhc48g17xzy0jqov56fnr7vepahyh";

        document.getElementById('form-triagem').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('btn-enviar');
            
            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                idade: document.getElementById('idade').value,
                prioridade: document.getElementById('prioridade').value,
                sintomas: document.getElementById('sintomas').value
            };

            btn.innerText = "🤖 AGENTE ANALISANDO...";
            btn.disabled = true;

            try {
                const response = await fetch(WEBHOOK_MAKE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (response.ok) {
                    alert("✅ Triagem enviada com sucesso!");
                    document.getElementById('form-triagem').reset();
                } else {
                    alert("❌ Erro no servidor do Make.");
                }
            } catch (error) {
                alert("❌ Erro ao conectar com o Agente.");
            } finally {
                btn.innerText = "ENVIAR TRIAGEM";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
