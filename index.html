<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Sistema de Triagem Médica</title>
</head>

<body>

    <div class="container">
        <h1>Pré-Atendimento</h1>

        <form id="triagemForm" action="https://hook.us2.make.com/v98msujjcukq18sjaqq6t5ftrl7z1y4l" method="POST">
            <input type="text" name="nome" placeholder="Nome completo" required>

            <input type="number" name="idade" placeholder="Idade" required>

            <select name="prioridade">
                <option value="">Nível de urgência</option>
                <option>Baixa</option>
                <option>Média</option>
                <option>Alta</option>
            </select>

            <textarea name="sintomas" placeholder="Descreva seus sintomas"></textarea>

            <button type="submit">Enviar dados</button>
        </form> 
        
        <div class="footer">
            Atendimento rápido e seguro
        </div>
    </div>
<script>

    const form = document.getElementById('triagemForm');
    
    // SUA CHAVE DE API (Mantenha em segurança)
    const API_KEY = "AIzaSyAf5lUlg4lNFs5Wu9HI2ofeJGJR3wBykA0"; 

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Seleciona o botão para dar feedback visual de carregamento
        const btn = form.querySelector('button');
        const originalText = btn.innerText;
        btn.innerText = "🤖 Agente analisando...";
        btn.disabled = true;

        const formData = new FormData(form);
        const sintomas = formData.get('sintomas');

        try {
            // 1. O Agente toma uma decisão técnica autônoma
            const analise = await consultarAgente(sintomas);

            if (analise.aprovado) {
                // 2. Se validado, processa os dados via automação do Make (Entrega 2)
                await enviarParaMake(formData);
            } else {
                // 3. Interação inteligente com a interface caso o relato seja insuficiente
                alert("⚠️ MENSAGEM DO AGENTE IA:\n\n" + analise.mensagem);
            }
        } catch (err) {
            console.error("Erro no fluxo do Agente:", err);
            alert("Erro técnico. Tente novamente.");
        } finally {
            // Restaura o estado original do botão
            btn.innerText = originalText;
            btn.disabled = false;
        }
    });

    async function consultarAgente(texto) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        
        // Prompt RIGOROSO para garantir que o Agente barre entradas inúteis como "socorro"
        const prompt = `Você é um Agente de Triagem Médica Rigoroso. 
        Analise o relato: "${texto}".
        
        REGRAS:
        1. Se o texto for vago (ex: "oi", "socorro", "ajuda", "dor") ou sem sentido clínico, responda: {"aprovado": false, "mensagem": "Relato muito vago. Por favor, descreva detalhadamente seus sintomas, onde dói e há quanto tempo."}.
        2. Se o texto descrever sintomas ou uma situação real de saúde, responda: {"aprovado": true}.
        
        Responda APENAS o JSON puro, sem formatação markdown ou textos extras.`;

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.1 } // Baixa temperatura para ser mais preciso e menos "criativo"[cite: 1]
            })
        });

        const data = await response.json();
        
        if (!data.candidates || !data.candidates[0].content.parts[0].text) {
            throw new Error("Resposta inválida da IA");
        }

        // Limpeza de possíveis formatações markdown (```json) que a IA possa enviar
        let rawText = data.candidates[0].content.parts[0].text;
        let cleanJson = rawText.replace(/```json|```/g, "").trim();
        
        return JSON.parse(cleanJson);
    }

    async function enviarParaMake(formData) {
        // Envia os dados para o seu Webhook do Make que já está configurado[cite: 1]
        const response = await fetch(form.action, {
            method: 'POST',
            body: formData
        });

        if (response.ok) {
            alert("✅ Triagem VALIDADA pelo Agente e enviada ao médico com sucesso!");
            form.reset();
        } else {
            throw new Error("Erro ao conectar com o Make");
        }
    }
    </script>
 
</body>

</html>
