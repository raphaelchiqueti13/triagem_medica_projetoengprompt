<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Sistema de Triagem Médica</title>
</head>

<body>

    <div class="container">
        <h1>Pré-Atendimento</h1>

        <form id="triagemForm" action="https://hook.us2.make.com/v98msujjcukq18sjaqq6t5ftrl7z1y4l" method="POST">
            <input type="text" name="nome" placeholder="Nome completo" required>

            <input type="number" name="idade" placeholder="Idade" required>

            <select name="prioridade">
                <option value="">Nível de urgência</option>
                <option>Baixa</option>
                <option>Média</option>
                <option>Alta</option>
            </select>

            <textarea name="sintomas" placeholder="Descreva seus sintomas"></textarea>

            <button type="submit">Enviar dados</button>
        </form> 
        
        <div class="footer">
            Atendimento rápido e seguro
        </div>
    </div>
<script>

async function consultarAgente(texto) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
    
    const prompt = `Você é um Agente de Triagem Médica. Analise: "${texto}". 
    Se for vago (ex: "ajuda", "oi", "socorro"), responda exatamente: {"aprovado": false, "mensagem": "Relato insuficiente. Por favor, detalhe seus sintomas."}. 
    Se for válido, responda: {"aprovado": true}.
    Responda apenas o JSON puro, sem blocos de código markdown.`;

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        
        const data = await response.json();

        // Se a API retornar erro de cota ou chave
        if (data.error) {
            console.error("Erro da API:", data.error.message);
            return { aprovado: true }; // Deixa passar para não travar o usuário
        }

        let rawText = data.candidates[0].content.parts[0].text;
        
        // LIMPEZA TOTAL: Remove ```json e qualquer texto extra que a IA inventar
        let cleanJson = rawText.replace(/```json|```|json/gi, "").trim();
        
        return JSON.parse(cleanJson);
    } catch (error) {
        console.error("Erro ao processar JSON:", error);
        // Se a IA "engasgar", o sistema deixa passar por segurança (fallback)
        return { aprovado: true }; 
    }
}
    </script>
 
</body>

</html>
