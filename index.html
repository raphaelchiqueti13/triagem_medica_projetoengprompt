<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Sistema de Triagem Médica</title>
</head>

<body>

    <div class="container">
        <h1>Pré-Atendimento</h1>

        <form id="triagemForm" action="https://hook.us2.make.com/v98msujjcukq18sjaqq6t5ftrl7z1y4l" method="POST">
            <input type="text" name="nome" placeholder="Nome completo" required>

            <input type="number" name="idade" placeholder="Idade" required>

            <select name="prioridade">
                <option value="">Nível de urgência</option>
                <option>Baixa</option>
                <option>Média</option>
                <option>Alta</option>
            </select>

            <textarea name="sintomas" placeholder="Descreva seus sintomas"></textarea>

            <button type="submit">Enviar dados</button>
        </form> 
        
        <div class="footer">
            Atendimento rápido e seguro
        </div>
    </div>

    <script>
        const form = document.getElementById('triagemForm');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = new FormData(form);

            fetch(form.action, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                alert("Triagem enviada com sucesso! Verifique seu e-mail em instantes.");
                form.reset();
            })
            .catch(error => {
                alert("Erro ao enviar. Verifique sua conexão.");
            });
        });
    </script>

</body>

</html>
